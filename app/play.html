<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap">
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Rat Games</title>
<style>
  :root {
    --accent-color: #c0622f;
    --bg-dark: #1a1008;
    --glass-bg: rgba(255,235,200,0.05);
    --glass-border: rgba(255,235,200,0.12);
  }

  * { margin:0; padding:0; box-sizing:border-box; font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif; }
  html { overflow: hidden; background: #1a1008; }
  html, body { height: 100%; }

  body {
    height: 100%;
    overflow-y: auto;
    overflow-x: hidden;
    max-width: 100%;
    background: transparent;
    display: flex;
    flex-direction: column;
    align-items: center;
    color: #f0e0c8;
    position: relative;
    padding: 40px 20px 110px;
  }

  /* Warm overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: linear-gradient(
      to bottom,
      rgba(20,10,4,0.10) 0%,
      rgba(20,10,4,0.20) 40%,
      rgba(20,10,4,0.35) 100%
    );
    z-index: 2;
    pointer-events: none;
  }

  h1 {
    font-size: 4rem;
    font-weight: 900;
    text-align: center;
    z-index: 4;
    position: relative;
    text-shadow: 0 0 10px rgba(255,255,255,0.2), 0 0 20px rgba(192,98,47,0.4), 0 0 40px rgba(192,98,47,0.2);
    margin-bottom: 20px;
    max-width: 95%;
    word-break: break-word;
    letter-spacing: -1px;
  }

  .wave span {
    display: inline-block;
    animation: wave 3.5s ease-in-out infinite;
  }
  @keyframes wave {
    0%   { transform: translateY(0); }
    50%  { transform: translateY(-12px); }
    100% { transform: translateY(0); }
  }

  /* Mode toggle */
  #mode-toggle {
    display: flex;
    gap: 8px;
    z-index: 4;
    position: relative;
    margin-bottom: 24px;
    background: rgba(255,235,200,0.04);
    border: 1px solid rgba(255,235,200,0.10);
    border-radius: 50px;
    padding: 4px;
  }
  .mode-btn {
    padding: 9px 26px;
    border-radius: 50px;
    border: none;
    background: transparent;
    color: rgba(240,224,200,0.55);
    font-size: 0.9rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s ease;
    font-family: inherit;
    letter-spacing: 0.3px;
  }
  .mode-btn:hover {
    color: rgba(240,224,200,0.85);
    background: rgba(255,235,200,0.06);
  }
  .mode-btn.active {
    background: rgba(192,98,47,0.25);
    color: #f0c898;
    box-shadow: 0 0 14px rgba(192,98,47,0.25);
  }

  /* Search */
  #search-container {
    width: 100%;
    max-width: 1400px;
    margin-bottom: 26px;
    z-index: 4;
    position: relative;
  }
  #search {
    width: 100%;
    padding: 16px 22px;
    border-radius: 14px;
    border: 1px solid rgba(255,235,200,0.10);
    font-size: 1rem;
    outline: none;
    background: rgba(255,235,200,0.05);
    color: #f0e0c8;
    backdrop-filter: blur(10px);
    transition: border-color 0.2s;
  }
  #search:focus { border-color: rgba(192,98,47,0.4); }
  #search::placeholder { color: rgba(240,224,200,0.4); }

  /* Grid */
  .game-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 25px;
    max-width: 1400px;
    width: 100%;
    z-index: 4;
    position: relative;
    align-items: start;
  }
  .game-card {
    background: rgba(255,235,200,0.04);
    border: 1px solid rgba(255,235,200,0.07);
    border-radius: 20px;
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.25s ease, box-shadow 0.25s ease, background 0.25s ease;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    padding: 10px;
  }
  .game-card:hover {
    transform: translateY(-8px);
    box-shadow: 0 12px 36px rgba(192,98,47,0.35);
    background: rgba(255,235,200,0.08);
    border-color: rgba(192,98,47,0.25);
  }

  /* Image wrapper — needed so the badge can overlay the image */
  .game-card .img-wrap {
    position: relative;
    width: 100%;
    margin-bottom: 10px;
  }
  .game-card img {
    width: 100%;
    aspect-ratio: 1 / 1;
    object-fit: cover;
    border-radius: 14px;
    display: block;
  }

  /* Cloud badge */
  .cloud-badge {
    position: absolute;
    bottom: 8px;
    left: 50%;
    transform: translateX(-50%);
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: rgba(10, 10, 20, 0.72);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.18);
    border-radius: 999px;
    padding: 4px 11px 4px 8px;
    white-space: nowrap;
    pointer-events: none;
  }
  .cloud-badge .dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #4fc3f7;
    box-shadow: 0 0 6px #4fc3f7, 0 0 12px rgba(79,195,247,0.5);
    flex: none;
  }
  .cloud-badge .label {
    font-size: 0.72rem;
    font-weight: 700;
    color: #e0f4ff;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  .game-card span {
    font-weight: 700;
    color: #f0e0c8;
    font-size: 1rem;
    padding: 4px 6px;
    line-height: 1.2;
    white-space: nowrap;
    text-overflow: ellipsis;
    overflow: hidden;
    max-width: 100%;
  }

  /* Footer */
  footer {
    position: fixed;
    bottom: 0; left: 0;
    width: 100%;
    display: flex;
    gap: 28px;
    font-size: 1.08rem;
    align-items: center;
    justify-content: center;
    z-index: 50;
    backdrop-filter: blur(14px);
    background: linear-gradient(to top, rgba(26,16,8,0.7), rgba(26,16,8,0.3));
    padding: 10px 8px;
    border-top: 1px solid rgba(255,235,200,0.06);
  }
  footer span { display: flex; align-items: center; position: relative; padding: 0 6px; }
  footer > span:not(:last-child)::after {
    content: '';
    position: absolute; right: 0; top: 50%;
    transform: translateY(-50%);
    width: 1px; height: 60%;
    background: rgba(255,235,200,0.15);
  }
  .seconds { color: rgba(240,224,200,0.55); font-weight: 400; margin-left: -4px; }
  .ampm    { color: rgba(240,224,200,0.55); font-size: 0.8em; margin-left: -6px; }
  .battery { display: flex; align-items: center; gap: 3px; }
  .battery svg { stroke: #f0e0c8; }
  a { color: #f0e0c8; text-decoration: none; }
  a:hover { text-decoration: underline; }

  /* Responsive */
  @media (max-width: 999px) {
    .game-grid { grid-template-columns: repeat(auto-fill, minmax(200px,1fr)); gap: 18px; }
  }
  @media (max-width: 699px) {
    .game-grid { grid-template-columns: repeat(auto-fill, minmax(155px,1fr)); gap: 14px; }
    h1 { font-size: 2.8rem; }
  }
  @media (max-width: 419px) {
    .game-grid { grid-template-columns: repeat(2,1fr); gap: 10px; }
    h1 { font-size: 2rem; }
    footer { flex-direction: row; flex-wrap: wrap; justify-content: center; }
  }

  body::-webkit-scrollbar { width: 8px; }
  body::-webkit-scrollbar-track { background: transparent; }
  body::-webkit-scrollbar-thumb { background: rgba(192,98,47,0.2); border-radius: 8px; }

  /* Rat GIF — fixed, above the dark overlay, below all content */
  #bg-rat {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    height: 55%;
    width: auto;
    z-index: 3;
    pointer-events: none;
    opacity: 1;
  }
</style>

  // ── PARSING ───────────────────────────────────────────────────────────────
  // Returns [title, img, link, isCloud]
  function parseList(raw) {
    return raw.trim().split('\n').map(line => {
      const parts = line.split(',').map(s => s.trim());
      const title = parts[0] ?? '';
      const img   = parts[1] ?? '';
      // Link may contain commas (e.g. query params) — rejoin everything except
      // a trailing "cloud" tag so URLs stay intact.
      const lastPart = parts[parts.length - 1].toLowerCase();
      const isCloud  = lastPart === 'cloud';
      const linkParts = isCloud ? parts.slice(2, -1) : parts.slice(2);
      const link = linkParts.join(',').trim();
      return [title, img, link, isCloud];
    }).filter(([t,,l]) => t && l);
  }

  const gamesList = parseList(rawGameList);
  const toolsList = parseList(rawToolsList);

  // ── REFS ──────────────────────────────────────────────────────────────────
  const grid     = document.getElementById('game-grid');
  const searchEl = document.getElementById('search');
  const titleEl  = document.getElementById('page-title');
  const btnGames = document.getElementById('btn-games');
  const btnTools = document.getElementById('btn-tools');

  let currentMode = location.search.includes('tools') ? 'tools' : 'games';
  let currentList = currentMode === 'tools' ? toolsList : gamesList;

  // ── RENDER ────────────────────────────────────────────────────────────────
  function renderList(list) {
    grid.innerHTML = '';
    const frag = document.createDocumentFragment();
    list.forEach(([title, img, link, isCloud]) => {
      const shouldProxy = useProxy || ALWAYS_PROXY.includes(title);
      let finalLink = link;
      if (shouldProxy && !link.includes('proxy.texas-projects.xyz')) {
        finalLink = PROXY_PREFIX + link;
      }
      const card = document.createElement('div');
      card.className = 'game-card';
      card.setAttribute('role', 'link');
      card.tabIndex = 0;
      card.onclick = () => window.location.href = finalLink;
      card.onkeyup = e => { if (e.key === 'Enter') window.location.href = finalLink; };

      const badgeHTML = isCloud
        ? `<div class="cloud-badge" aria-label="Cloud game">
             <span class="dot"></span>
             <span class="label">Cloud</span>
           </div>`
        : '';

      card.innerHTML = `
        <div class="img-wrap">
          <img src="${img}" alt="${title}" loading="lazy">
          ${badgeHTML}
        </div>
        <span title="${title}">${title}</span>`;
      frag.appendChild(card);
    });
    grid.appendChild(frag);
  }

  // ── MODE SWITCH ───────────────────────────────────────────────────────────
  function applyMode(mode, push) {
    currentMode = mode;
    const isTools = mode === 'tools';
    currentList = isTools ? toolsList : gamesList;

    const label = isTools ? 'RAT GAMES TOOLS' : 'RAT GAMES';
    titleEl.textContent = label;
    titleEl.classList.remove('wave');

    const text = titleEl.textContent;
    titleEl.textContent = '';
    [...text].forEach((char, i) => {
      const span = document.createElement('span');
      span.textContent = char === ' ' ? '\u00A0' : char;
      span.style.animationDelay = `${i * 0.08}s`;
      titleEl.appendChild(span);
    });
    titleEl.classList.add('wave');

    document.title = isTools ? 'Rat Games Tools' : 'Rat Games';
    searchEl.placeholder = isTools ? 'Search tools...' : 'Search games...';
    searchEl.value = '';

    btnGames.classList.toggle('active', !isTools);
    btnTools.classList.toggle('active', isTools);

    if (push) {
      history.pushState({ mode }, '', isTools ? location.pathname + '?tools' : location.pathname);
    }

    window.parent.postMessage({ type: 'modeChange', mode }, '*');
    renderList(currentList);
  }

  function setMode(mode) { applyMode(mode, true); }

  window.addEventListener('popstate', () => {
    applyMode(location.search.includes('tools') ? 'tools' : 'games', false);
  });

  applyMode(currentMode, false);

  // ── SEARCH ────────────────────────────────────────────────────────────────
  searchEl.addEventListener('input', () => {
    const q = searchEl.value.toLowerCase().trim();
    renderList(q ? currentList.filter(([t]) => t.toLowerCase().includes(q)) : currentList);
  });

  // ── CLOCK ─────────────────────────────────────────────────────────────────
  function updateTime() {
    const now = new Date();
    let hh = now.getHours();
    const ampm = hh >= 12 ? 'PM' : 'AM';
    hh = hh % 12 || 12;
    const mm = String(now.getMinutes()).padStart(2, '0');
    const ss = String(now.getSeconds()).padStart(2, '0');
    document.getElementById('time').innerHTML =
      `${hh}:${mm}:<span class="seconds">${ss}</span><span class="ampm">${ampm}</span>`;
  }
  setInterval(updateTime, 1000);
  updateTime();

  // ── BATTERY ───────────────────────────────────────────────────────────────
  const batteryText = document.getElementById('battery-text');
  if (navigator.getBattery) {
    navigator.getBattery().then(b => {
      const upd = () => batteryText.textContent = `${Math.round(b.level * 100)}%`;
      b.addEventListener('levelchange', upd);
      b.addEventListener('chargingchange', upd);
      upd();
    });
  } else { batteryText.textContent = 'N/A'; }
