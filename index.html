<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Rat Games</title>
  <link rel="icon" href='data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M8 3l4 8 5-5 5 15H2L8 3z" fill="none" stroke="black" stroke-width="2.5"/></svg>' type="image/svg+xml">
  <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
  <style>
    body, html {
      margin: 0; padding: 0; width: 100%; height: 100%;
      font-family: "Inter", -apple-system, sans-serif;
      overflow: hidden;
      background: url('media/bg.gif') center/auto 55% no-repeat fixed;
      background-color: #1a1008;
      color: #f0e0c8;
    }
    body::before {
      content: ''; position: fixed; inset: 0;
      background: rgba(20,10,4,0.55);
      z-index: 0; pointer-events: none;
    }

    /* ── HAMBURGER BUTTON ──────────────────────────────── */
    #menu-btn {
      position: fixed;
      bottom: 24px; left: 24px;
      width: 54px; height: 54px;
      border-radius: 14px;
      background: rgba(240,200,140,0.15);
      border: 1.5px solid rgba(240,200,140,0.5);
      backdrop-filter: blur(14px);
      box-shadow: 0 4px 22px rgba(192,98,47,0.3);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; z-index: 1002;
      transition: background 0.2s, border-color 0.2s;
    }
    #menu-btn:hover {
      background: rgba(240,200,140,0.26);
      border-color: rgba(240,200,140,0.8);
    }
    #menu-btn svg {
      width: 22px; height: 22px;
      stroke: #f0d090; stroke-width: 2.8;
      fill: none; stroke-linecap: round; stroke-linejoin: round;
      pointer-events: none;
    }

    /* ── MENU WRAPPER (card + action buttons side by side) */
    #menu-wrap {
      position: fixed;
      bottom: 24px; left: 24px;
      display: flex;
      flex-direction: row;
      align-items: flex-end;
      gap: 10px;
      z-index: 1001;
      /* hidden by default */
      opacity: 0;
      pointer-events: none;
      transform: translateY(10px) scale(0.97);
      transform-origin: bottom left;
      transition: opacity 0.22s ease, transform 0.22s ease;
    }
    #menu-wrap.open {
      opacity: 1;
      pointer-events: all;
      transform: translateY(0) scale(1);
    }

    /* ── MAIN CARD ─────────────────────────────────────── */
    #menu-card {
      background: rgba(16,8,2,0.94);
      border: 1px solid rgba(255,235,200,0.12);
      border-radius: 20px;
      padding: 10px;
      min-width: 240px;
      backdrop-filter: blur(24px);
      box-shadow: 0 20px 60px rgba(0,0,0,0.65), 0 0 0 1px rgba(255,235,200,0.05) inset;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    /* Each nav item is its own pill button with a permanent border */
    .mp-item {
      display: flex; align-items: center; gap: 13px;
      padding: 0 16px;
      height: 50px;
      border-radius: 12px;
      cursor: pointer;
      color: rgba(240,224,200,0.75);
      font-size: 1rem; font-weight: 600;
      white-space: nowrap;
      background: rgba(255,235,200,0.04);
      border: 1px solid rgba(255,235,200,0.09);
      transition: background 0.15s, color 0.15s, border-color 0.15s;
      box-sizing: border-box;
    }
    .mp-item:hover {
      background: rgba(255,235,200,0.10);
      color: #f0e0c8;
      border-color: rgba(255,235,200,0.2);
    }
    .mp-item.active {
      background: rgba(192,98,47,0.22);
      color: #c0622f;
      border-color: rgba(192,98,47,0.4);
    }
    .mp-item i { font-size: 19px; width: 22px; text-align: center; flex-shrink: 0; }

    /* ── 3 ACTION BUTTONS (column, right of card) ──────── */
    #menu-actions {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .ma-btn {
      width: 58px; height: 58px;
      border-radius: 14px;
      background: rgba(16,8,2,0.92);
      border: 1px solid rgba(255,235,200,0.12);
      backdrop-filter: blur(14px);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      color: rgba(240,224,200,0.7);
      box-shadow: 0 4px 16px rgba(0,0,0,0.4);
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }
    .ma-btn:hover {
      background: rgba(192,98,47,0.25);
      color: #f0e0c8;
      border-color: rgba(192,98,47,0.45);
    }
    .ma-btn svg {
      width: 21px; height: 21px;
      stroke: currentColor; fill: none;
      stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
    }

    /* ── IFRAME ─────────────────────────────────────────── */
    #content-iframe {
      position: absolute; top: 0; left: 0;
      width: 100%; height: 100%;
      border: none; z-index: 1;
    }
  </style>
</head>
<body>

  <!-- Hamburger trigger -->
  <div id="menu-btn">
    <svg viewBox="0 0 24 24">
      <line x1="3" y1="6" x2="21" y2="6"/>
      <line x1="3" y1="12" x2="21" y2="12"/>
      <line x1="3" y1="18" x2="21" y2="18"/>
    </svg>
  </div>

  <!-- Menu: card + action buttons side by side -->
  <div id="menu-wrap">

    <!-- Left: nav card -->
    <div id="menu-card">
      <div class="mp-item" id="mpHome"     onclick="navigate('app/home.html', this)"><i class="ri-home-line"></i> Home</div>
      <div style="height:1px;background:rgba(255,235,200,0.1);margin:2px 4px"></div>
      <div class="mp-item" id="mpPlay"     onclick="navigate('app/play.html', this)"><i class="ri-gamepad-line"></i> Play</div>
      <div class="mp-item" id="mpApps"     onclick="navigate('app/play.html?tools', this)"><i class="ri-apps-line"></i> Apps</div>
      <div class="mp-item" id="mpInternet"><i class="ri-earth-line"></i> Internet</div>
      <div class="mp-item" id="mpMusic"    onclick="navigate('app/music.html', this)"><i class="ri-music-line"></i> Music</div>
      <div class="mp-item" id="mpWatch"    onclick="navigate('app/watch.html', this)"><i class="ri-clapperboard-line"></i> Watch</div>
      <div class="mp-item" id="mpWatch"    onclick="navigate('app/ai', this)"><i class="ri-robot-2-line"></i> AI</div>
    </div>

    <!-- Right: 3 icon buttons -->
    <div id="menu-actions">
      <div class="ma-btn" onclick="navigate('app/feedback.html', null)" title="Feedback">
        <i class="ri-feedback-line" style="font-size:21px"></i>
      </div>
      <div class="ma-btn" onclick="navigate('app/settings.html', null)" title="Settings">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </div>
    </div>

  </div>

  <iframe src="app/home.html" id="content-iframe" allowtransparency="true"></iframe>

  <script>
    const iframe  = document.getElementById('content-iframe');
    const btn     = document.getElementById('menu-btn');
    const wrap    = document.getElementById('menu-wrap');

    let isOpen = false;
    let closeTimeout;

    function openMenu() {
      clearTimeout(closeTimeout);
      if (isOpen) return;
      isOpen = true;
      btn.style.opacity = '0';
      btn.style.pointerEvents = 'none';
      wrap.classList.add('open');
    }

    function closeMenu(delay = 220) {
      closeTimeout = setTimeout(() => {
        isOpen = false;
        wrap.classList.remove('open');
        btn.style.opacity = '';
        btn.style.pointerEvents = '';
      }, delay);
    }

    // Desktop: hover on button opens, leaving the whole wrap closes
    btn.addEventListener('mouseenter', openMenu);
    wrap.addEventListener('mouseleave', () => closeMenu(220));
    wrap.addEventListener('mouseenter', () => clearTimeout(closeTimeout));

    // Mobile: tap button toggles
    btn.addEventListener('touchend', e => {
      e.preventDefault();
      openMenu();
    }, { passive: false });

    // Outside click closes
    document.addEventListener('click', e => {
      if (!btn.contains(e.target) && !wrap.contains(e.target)) closeMenu(0);
    });

    function navigate(url, element) {
      iframe.src = url;
      document.querySelectorAll('.mp-item').forEach(i => i.classList.remove('active'));
      if (element) element.classList.add('active');
      closeMenu(0);
    }

    // Internet button
    fetch('https://cdn.jsdelivr.net/gh/4texas4/4texas4.github.io@main/CsbLinkWorking.txt')
      .then(r => r.text())
      .then(() => {
        const proxy = 'https://proxy.texas-projects.xyz/';
        document.getElementById('mpInternet').onclick = () => navigate(proxy, document.getElementById('mpInternet'));
      })
      .catch(() => {});

    // Mode sync
    window.addEventListener('message', e => {
      if (e.data?.type === 'modeChange') {
        document.querySelectorAll('.mp-item').forEach(i => i.classList.remove('active'));
        document.getElementById(e.data.mode === 'tools' ? 'mpApps' : 'mpPlay')?.classList.add('active');
      }
    });

    // First visit hint
    if (!localStorage.getItem('menuHintSeen')) {
      setTimeout(() => {
        const h = document.createElement('div');
        h.innerHTML = `<div style="position:fixed;bottom:90px;left:16px;z-index:2000;background:rgba(192,98,47,0.95);color:#fff;padding:12px 18px;border-radius:14px;font-size:0.85rem;font-family:Inter,sans-serif;box-shadow:0 8px 32px rgba(0,0,0,0.45);max-width:210px;line-height:1.4">👆 Hover here to open the menu<div style="position:absolute;bottom:-8px;left:20px;border-left:8px solid transparent;border-right:8px solid transparent;border-top:8px solid rgba(192,98,47,0.95)"></div></div>`;
        document.body.appendChild(h);
        localStorage.setItem('menuHintSeen', '1');
        setTimeout(() => h.remove(), 4000);
      }, 1200);
    }
  </script>
</body>
</html>
